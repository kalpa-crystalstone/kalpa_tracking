<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <meta property="og:title" content="Kalpa Tracking" />
    <meta property="og:description" content="Check your parcel status" />
    <meta
      property="og:image"
      content="https://kalpa-crystalstone.github.io/kalpa_tracking/assets/logo_profile_white_print.png"
    />
    <meta property="og:type" content="website" />

    <title>ติดตามเลขพัสดุ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="search-card">
        <h1 class="title-with-icon">
          <img src="./assets/box.svg" alt="กล่องพัสดุ" width="20" />
          ติดตามเลขพัสดุ
        </h1>
        <p class="hint">กรอกเบอร์โทรศัพท์ ตัวอย่าง 0812345678</p>

        <form id="lookup-form" class="search-row">
          <label class="input-wrap">
            <img class="input-icon" src="./assets/phone.svg" alt="โทรศัพท์" />
            <input
              id="mobile-number"
              type="tel"
              placeholder="กรอกเบอร์โทรศัพท์"
              required
            />
          </label>
          <button id="submit-btn" class="search-btn" type="submit">
            <img src="./assets/search.svg" alt="search Icon" class="btn-icon" />
          </button>
        </form>
      </section>

      <section class="list-card">
        <h2 class="title">
          รายการเลขพัสดุ
          <span
            id="total-count-label"
            class="count-label"
            style="display: none"
          ></span>
        </h2>

        <div id="empty-state" class="empty-state">
          <img src="./assets/truck2.svg" alt="รถบรรทุก" width="386" />
          <p class="empty-text">ยังไม่มีรายการ</p>
        </div>

        <div id="error-state" class="empty-state" style="display: none">
          <img src="assets/search.svg" alt="error" width="386" />
          <p class="empty-text">ไม่พบข้อมูล หรือ เกิดข้อผิดพลาด</p>
        </div>

        <div id="result-section" style="display: none">
          <ul
            id="result-list"
            style="list-style: none; padding: 0; margin: 0"
          ></ul>
        </div>
      </section>
    </main>

    <div id="loading-state">
      <img src="assets/search.svg" alt="loading" width="120" />
      <p class="empty-text">กำลังค้นหา...</p>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
